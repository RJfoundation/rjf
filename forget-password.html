<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রফেশনাল রিসেট - RJ Foundation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* মূল পেজের ক্লিন ব্যাকগ্রাউন্ড */
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6; /* হালকা ধূসর ব্যাকগ্রাউন্ড */
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
        }

        /* সাদা এবং মিনিমালিস্ট বক্স */
        .reset-container {
            background: #ffffff;
            padding: 40px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* খুব হালকা শ্যাডো */
            width: 360px; text-align: center;
            border: 1px solid #e1e8ed; /* হালকা বর্ডার */
        }

        /* ক্লিন আইকন এবং টেক্সট */
        .icon-box { font-size: 45px; margin-bottom: 20px; color: #00796b; } /* তোর ব্র্যান্ডের সবুজ রঙ */
        h2 { margin-bottom: 8px; font-weight: 600; color: #1a1a1a; font-size: 24px; }
        p { font-size: 14px; color: #657786; margin-bottom: 30px; line-height: 1.4; }

        /* ইনপুট ফিল্ডের ক্লিন ডিজাইন */
        .input-group { position: relative; margin-bottom: 12px; }
        input {
            width: 100%; padding: 14px 45px 14px 15px;
            border-radius: 8px; border: 1px solid #ccd6dd;
            background: #ffffff; color: #1a1a1a;
            outline: none; box-sizing: border-box; font-size: 15px;
            transition: 0.2s;
        }
        input:focus { border-color: #00796b; box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.1); }

        /* পাসওয়ার্ড স্ট্রেন্থ ইন্ডিকেটর - আরও সরু */
        .strength-meter {
            height: 3px; background: #e1e8ed;
            margin-bottom: 25px; border-radius: 1.5px; overflow: hidden;
        }
        .strength-bar { height: 100%; width: 0; transition: 0.3s; }

        /* ক্লিন বাটন ডিজাইন */
        button {
            width: 100%; padding: 14px; border-radius: 8px;
            border: none; background: #00796b; color: white;
            font-weight: 600; font-size: 16px; cursor: pointer;
            transition: 0.2s;
        }
        button:disabled { background: #aab8c2; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #004d40; }

        /* মেসেজ বক্স - ক্লিন */
        #message {
            margin-top: 20px; font-size: 13px; padding: 12px;
            border-radius: 8px; display: none; line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="reset-container" id="main-box">
    <div class="icon-box"><i class="fas fa-lock"></i></div>
    <h2>পাসওয়ার্ড রিসেট</h2>
    <p id="sub-text">আপনার RJ Foundation অ্যাকাউন্টের জন্য একটি নতুন এবং শক্তিশালী পাসওয়ার্ড সেট করুন।</p>

    <div id="reset-form">
        <div class="input-group">
            <input type="password" id="new-password" placeholder="নতুন পাসওয়ার্ড..." oninput="checkStrength()">
            <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 16px; cursor: pointer; color: #657786; font-size: 14px;"></i>
        </div>
        
        <div class="strength-meter">
            <div id="strength-bar" class="strength-bar"></div>
        </div>

        <button id="submit-btn" onclick="handlePasswordReset()">পাসওয়ার্ড আপডেট করুন</button>
    </div>
    <div id="message"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    // তোর ফায়ারবেস কনফিগ (অক্ষত রাখা হয়েছে)
    const firebaseConfig = {
        apiKey: "AIzaSyAd0K18nLhmDsljRZuk4wvn9wPtHyuc7cM",
        authDomain: "rj-chats1.firebaseapp.com",
        projectId: "rj-chats1",
        storageBucket: "rj-chats1.firebasestorage.app",
        messagingSenderId: "464542067879",
        appId: "1:464542067879:web:7c47353045bf5c7362bf82",
        databaseURL: "https://rj-chats1-default-rtdb.firebaseio.com/" 
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const urlParams = new URLSearchParams(window.location.search);
    const actionCode = urlParams.get('oobCode');

    // লিংক ভেরিফিকেশন (লজিক অক্ষত)
    if (!actionCode) {
        document.getElementById('reset-form').style.display = 'none';
        showMsg("ভুল লিংক! অথবা আপনি সরাসরি এই পেজে ঢোকার চেষ্টা করছেন। দয়া করে ইমেইল চেক করুন।", false);
    }

    // পাসওয়ার্ডের শক্তি পরীক্ষা (লজিক অক্ষত, শুধু রঙগুলো ক্লিন করা হয়েছে)
    function checkStrength() {
        const val = document.getElementById('new-password').value;
        const bar = document.getElementById('strength-bar');
        let strength = 0;

        if (val.length >= 8) strength += 25;
        if (/[A-Z]/.test(val)) strength += 25;
        if (/[0-9]/.test(val)) strength += 25;
        if (/[^A-Za-z0-9]/.test(val)) strength += 25;

        bar.style.width = strength + "%";
        // প্রফেশনাল কালার প্যালেট
        if (strength <= 25) bar.style.backgroundColor = "#e0245e"; // লাল
        else if (strength <= 50) bar.style.backgroundColor = "#ffad1f"; // কমলা
        else if (strength <= 75) bar.style.backgroundColor = "#1da1f2"; // নীল
        else bar.style.backgroundColor = "#17bf63"; // সবুজ
        
        return strength;
    }

    // পাসওয়ার্ড লুকানো/দেখানো
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passInput = document.getElementById('new-password');
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
        this.classList.toggle('fa-eye-slash');
    });

    // মেসেজ দেখানোর ফাংশন (রঙ ক্লিন করা হয়েছে)
    function showMsg(text, success = false) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';
        msgDiv.style.background = success ? "#e8f5e9" : "#ffebee"; // হালকা সবুজ/লাল ব্যাকগ্রাউন্ড
        msgDiv.style.color = success ? "#2e7d32" : "#c62828"; // গাঢ় সবুজ/লাল টেক্সট
        msgDiv.style.border = success ? "1px solid #c8e6c9" : "1px solid #ffcdd2";
    }

    // পাসওয়ার্ড রিসেট হ্যান্ডলার (লজিক ১০০% অক্ষত)
    async function handlePasswordReset() {
        const newPassword = document.getElementById('new-password').value;
        const btn = document.getElementById('submit-btn');
        const strength = checkStrength();

        if (strength < 75) {
            showMsg("পাসওয়ার্ডটি যথেষ্ট শক্তিশালী নয়! কমপক্ষে ৮ অক্ষর, সংখ্যা এবং স্পেশাল ক্যারেক্টার ব্যবহার করুন।");
            return;
        }

        btn.disabled = true;
        btn.innerText = "প্রসেসিং হচ্ছে...";

        try {
            await auth.verifyPasswordResetCode(actionCode);
            await auth.confirmPasswordReset(actionCode, newPassword);
            
            showMsg("সফল! পাসওয়ার্ড আপডেট হয়েছে। আপনাকে হোমে নিয়ে যাওয়া হচ্ছে...", true);
            setTimeout(() => window.location.href = "index.html", 3000);
        } catch (error) {
            btn.disabled = false;
            btn.innerText = "আবার চেষ্টা করুন";
            let errorMessage = "লিংকটি কাজ করছে না। হয়তো এটি আগে একবার ব্যবহার করা হয়েছে বা মেয়াদ শেষ।";
            if (error.code === "auth/weak-password") errorMessage = "পাসওয়ার্ডটি খুবই দুর্বল!";
            showMsg(errorMessage);
        }
    }
</script>
</body>
</html>
