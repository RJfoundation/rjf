<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাকাউন্ট ভেরিফিকেশন - RJ Foundation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
        }

        .reset-container {
            background: #ffffff;
            padding: 40px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 360px; text-align: center;
            border: 1px solid #e1e8ed;
        }

        .icon-box { font-size: 45px; margin-bottom: 20px; color: #00796b; }
        h2 { margin-bottom: 8px; font-weight: 600; color: #1a1a1a; font-size: 24px; }
        p { font-size: 14px; color: #657786; margin-bottom: 30px; line-height: 1.4; }

        .input-group { position: relative; margin-bottom: 12px; }
        input {
            width: 100%; padding: 14px 45px 14px 15px;
            border-radius: 8px; border: 1px solid #ccd6dd;
            background: #ffffff; color: #1a1a1a;
            outline: none; box-sizing: border-box; font-size: 15px;
            transition: 0.2s;
        }
        input:focus { border-color: #00796b; box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.1); }

        .strength-meter {
            height: 3px; background: #e1e8ed;
            margin-bottom: 25px; border-radius: 1.5px; overflow: hidden;
        }
        .strength-bar { height: 100%; width: 0; transition: 0.3s; }

        button {
            width: 100%; padding: 14px; border-radius: 8px;
            border: none; background: #00796b; color: white;
            font-weight: 600; font-size: 16px; cursor: pointer;
            transition: 0.2s;
        }
        button:disabled { background: #aab8c2; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #004d40; }

        #message {
            margin-top: 20px; font-size: 13px; padding: 12px;
            border-radius: 8px; display: none; line-height: 1.4;
        }

        /* ভেরিফিকেশন মোডের জন্য বিশেষ স্টাইল */
        #verify-ui { display: none; }
    </style>
</head>
<body>

<div class="reset-container" id="main-box">
    <div id="reset-ui">
        <div class="icon-box"><i class="fas fa-lock"></i></div>
        <h2 id="title-text">পাসওয়ার্ড রিসেট/ভেরিফিকেশন</h2>
        <p id="sub-text">রূপসা জনকল্যাণ ফাউন্ডেশন এর অ্যাকাউন্টের জন্য পাসওয়ার্ড এবং ভেরিফিকেশন সিস্টেম।</p>

        <div id="reset-form">
            <div class="input-group">
                <input type="password" id="new-password" placeholder="নতুন পাসওয়ার্ড..." oninput="checkStrength()">
                <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 16px; cursor: pointer; color: #657786; font-size: 14px;"></i>
            </div>
            <div class="strength-meter">
                <div id="strength-bar" class="strength-bar"></div>
            </div>
            <button id="submit-btn" onclick="handlePasswordReset()">পাসওয়ার্ড আপডেট করুন</button>
        </div>
    </div>

    <div id="verify-ui">
        <div class="icon-box"><i class="fas fa-user-check"></i></div>
        <h2>ইমেইল ভেরিফিকেশন</h2>
        <p>আপনার অ্যাকাউন্টটি সক্রিয় করতে নিচের বাটনে ক্লিক করুন।</p>
        <button id="verify-btn" onclick="handleEmailVerification()">অ্যাকাউন্ট ভেরিফাই করুন</button>
    </div>

    <div id="message"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD80uA81X3bkwiousPwXpIv6OKkk1k2icA",
        authDomain: "rjfoundation-25.firebaseapp.com",
        projectId: "rjfoundation-25",
        storageBucket: "rjfoundation-25.firebasestorage.app",
        messagingSenderId: "469641336275",
        appId: "1:469641336275:web:e79889fb0247f352f04b26",
        databaseURL: "https://rjfoundation-25-default-rtdb.firebaseio.com" 
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode'); // মোড চেক (verifyEmail নাকি resetPassword)
    const actionCode = urlParams.get('oobCode');

    // সঠিক UI দেখানো
    if (mode === 'verifyEmail') {
        document.getElementById('reset-ui').style.display = 'none';
        document.getElementById('verify-ui').style.display = 'block';
    } else if (mode === 'resetPassword') {
        document.getElementById('reset-ui').style.display = 'block';
        document.getElementById('verify-ui').style.display = 'none';
    } else if (!actionCode) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('verify-ui').style.display = 'none';
        showMsg("ভুল লিংক! দয়া করে ইমেইল চেক করুন।", false);
    }

    // ইমেইল ভেরিফিকেশন হ্যান্ডলার
    function handleEmailVerification() {
        const btn = document.getElementById('verify-btn');
        btn.disabled = true;
        btn.innerText = "ভেরিফাই হচ্ছে...";

        auth.applyActionCode(actionCode)
            .then(() => {
                showMsg("সফল! আপনার ইমেইল ভেরিফাই হয়েছে। এখন আপনি লগইন করতে পারবেন।", true);
                setTimeout(() => window.location.href = "login.html", 3000);
            })
            .catch((error) => {
                btn.disabled = false;
                btn.innerText = "আবার চেষ্টা করুন";
                showMsg("লিংকটি কাজ করছে না বা মেয়াদ শেষ।");
            });
    }

    // পাসওয়ার্ড স্ট্রেন্থ লজিক (অক্ষত)
    function checkStrength() {
        const val = document.getElementById('new-password').value;
        const bar = document.getElementById('strength-bar');
        let strength = 0;
        if (val.length >= 8) strength += 25;
        if (/[A-Z]/.test(val)) strength += 25;
        if (/[0-9]/.test(val)) strength += 25;
        if (/[^A-Za-z0-9]/.test(val)) strength += 25;
        bar.style.width = strength + "%";
        if (strength <= 25) bar.style.backgroundColor = "#e0245e";
        else if (strength <= 50) bar.style.backgroundColor = "#ffad1f";
        else if (strength <= 75) bar.style.backgroundColor = "#1da1f2";
        else bar.style.backgroundColor = "#17bf63";
        return strength;
    }

    document.getElementById('togglePassword').addEventListener('click', function() {
        const passInput = document.getElementById('new-password');
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
        this.classList.toggle('fa-eye-slash');
    });

    function showMsg(text, success = false) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';
        msgDiv.style.background = success ? "#e8f5e9" : "#ffebee";
        msgDiv.style.color = success ? "#2e7d32" : "#c62828";
        msgDiv.style.border = success ? "1px solid #c8e6c9" : "1px solid #ffcdd2";
    }

    // পাসওয়ার্ড রিসেট হ্যান্ডলার (অক্ষত)
    async function handlePasswordReset() {
        const newPassword = document.getElementById('new-password').value;
        const btn = document.getElementById('submit-btn');
        if (checkStrength() < 75) {
            showMsg("পাসওয়ার্ডটি যথেষ্ট শক্তিশালী নয়!");
            return;
        }
        btn.disabled = true;
        btn.innerText = "প্রসেসিং হচ্ছে...";
        try {
            await auth.verifyPasswordResetCode(actionCode);
            await auth.confirmPasswordReset(actionCode, newPassword);
            showMsg("সফল! পাসওয়ার্ড আপডেট হয়েছে।", true);
            setTimeout(() => window.location.href = "donate.html", 3000);
        } catch (error) {
            btn.disabled = false;
            btn.innerText = "আবার চেষ্টা করুন";
            showMsg("লিংকটি কাজ করছে না বা মেয়াদ শেষ।");
        }
    }
</script>
</body>
</html>
