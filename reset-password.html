<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Security Reset - RJ Foundation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #004d40 0%, #002420 100%);
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
        }

        .reset-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            width: 380px; text-align: center; color: white;
            transition: 0.3s;
        }

        .icon-box { font-size: 55px; margin-bottom: 15px; color: #a7ffeb; }
        h2 { margin-bottom: 5px; font-weight: 600; }
        p { font-size: 13px; opacity: 0.7; margin-bottom: 25px; }

        .input-group { position: relative; margin-bottom: 15px; }
        input {
            width: 100%; padding: 16px 45px 16px 15px;
            border-radius: 12px; border: 1.5px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2); color: white;
            outline: none; box-sizing: border-box; font-size: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: #a7ffeb; box-shadow: 0 0 10px rgba(167, 255, 235, 0.2); }

        /* পাসওয়ার্ড স্ট্রেন্থ ইন্ডিকেটর */
        .strength-meter {
            height: 4px; background: rgba(255,255,255,0.1);
            margin-bottom: 20px; border-radius: 2px; overflow: hidden;
        }
        .strength-bar { height: 100%; width: 0; transition: 0.4s; }

        button {
            width: 100%; padding: 15px; border-radius: 12px;
            border: none; background: #00bfa5; color: white;
            font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 191, 165, 0.3);
            transition: 0.3s;
        }
        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; }
        button:hover:not(:disabled) { background: #00e5ff; transform: translateY(-2px); }

        #message {
            margin-top: 15px; font-size: 12px; padding: 12px;
            border-radius: 8px; display: none; line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="reset-container" id="main-box">
    <div class="icon-box"><i class="fas fa-shield-alt"></i></div>
    <h2>নিরাপদ রিসেট</h2>
    <p id="sub-text">আপনার অ্যাকাউন্টের জন্য নতুন পাসওয়ার্ড সেট করুন।</p>

    <div id="reset-form">
        <div class="input-group">
            <input type="password" id="new-password" placeholder="নতুন শক্তিশালী পাসওয়ার্ড..." oninput="checkStrength()">
            <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 18px; cursor: pointer; opacity: 0.6;"></i>
        </div>
        
        <div class="strength-meter">
            <div id="strength-bar" class="strength-bar"></div>
        </div>

        <button id="submit-btn" onclick="handlePasswordReset()">পাসওয়ার্ড আপডেট করুন</button>
    </div>
    <div id="message"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAd0K18nLhmDsljRZuk4wvn9wPtHyuc7cM",
        authDomain: "rj-chats1.firebaseapp.com",
        projectId: "rj-chats1",
        storageBucket: "rj-chats1.firebasestorage.app",
        messagingSenderId: "464542067879",
        appId: "1:464542067879:web:7c47353045bf5c7362bf82",
        databaseURL: "https://rj-chats1-default-rtdb.firebaseio.com/" 
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const urlParams = new URLSearchParams(window.location.search);
    const actionCode = urlParams.get('oobCode');

    // লিংক ভেরিফিকেশন (পেজ লোড হতেই চেক করবে লিংক আসল কি না)
    if (!actionCode) {
        document.getElementById('reset-form').style.display = 'none';
        showMsg("ভুল লিংক! অথবা আপনি সরাসরি এই পেজে ঢোকার চেষ্টা করছেন। দয়া করে ইমেইল চেক করুন।", false);
    }

    // পাসওয়ার্ডের শক্তি পরীক্ষা
    function checkStrength() {
        const val = document.getElementById('new-password').value;
        const bar = document.getElementById('strength-bar');
        let strength = 0;

        if (val.length >= 8) strength += 25;
        if (/[A-Z]/.test(val)) strength += 25;
        if (/[0-9]/.test(val)) strength += 25;
        if (/[^A-Za-z0-9]/.test(val)) strength += 25;

        bar.style.width = strength + "%";
        if (strength <= 25) bar.style.backgroundColor = "#ff5252";
        else if (strength <= 50) bar.style.backgroundColor = "#ffd740";
        else if (strength <= 75) bar.style.backgroundColor = "#40c4ff";
        else bar.style.backgroundColor = "#69f0ae";
        
        return strength;
    }

    // পাসওয়ার্ড লুকানো/দেখানো
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passInput = document.getElementById('new-password');
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
        this.classList.toggle('fa-eye-slash');
    });

    function showMsg(text, success = false) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';
        msgDiv.style.background = success ? 'rgba(0, 200, 83, 0.15)' : 'rgba(211, 47, 47, 0.15)';
        msgDiv.style.color = success ? '#69f0ae' : '#ff8a80';
    }

    async function handlePasswordReset() {
        const newPassword = document.getElementById('new-password').value;
        const btn = document.getElementById('submit-btn');
        const strength = checkStrength();

        if (strength < 75) {
            showMsg("পাসওয়ার্ডটি যথেষ্ট শক্তিশালী নয়! কমপক্ষে ৮ অক্ষর, সংখ্যা এবং স্পেশাল ক্যারেক্টার ব্যবহার করুন।");
            return;
        }

        btn.disabled = true;
        btn.innerText = "প্রসেসিং হচ্ছে...";

        try {
            // ভেরিফাই করা যে ইমেইল লিংকটি এখনো কাজ করছে কি না
            await auth.verifyPasswordResetCode(actionCode);
            // পাসওয়ার্ড কনফার্ম করা
            await auth.confirmPasswordReset(actionCode, newPassword);
            
            showMsg("সফল! পাসওয়ার্ড আপডেট হয়েছে। আপনাকে হোমে নিয়ে যাওয়া হচ্ছে...", true);
            setTimeout(() => window.location.href = "index.html", 3000);
        } catch (error) {
            btn.disabled = false;
            btn.innerText = "আবার চেষ্টা করুন";
            let errorMessage = "লিংকটি কাজ করছে না। হয়তো এটি আগে একবার ব্যবহার করা হয়েছে বা মেয়াদ শেষ।";
            if (error.code === "auth/weak-password") errorMessage = "পাসওয়ার্ডটি খুবই দুর্বল!";
            showMsg(errorMessage);
        }
    }
</script>
</body>
</html>
