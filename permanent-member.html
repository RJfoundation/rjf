        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-hover: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-accent: #00d2ff;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- Main Box & Responsive Design --- */
        .member-scroll-box {
            width: 380px;
            height: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        /* মোবাইল রেস্পন্সিভ */
        @media (max-width: 480px) {
            .member-scroll-box {
                width: 92%;
                height: 450px;
                border-radius: 20px;
            }
        }

        .member-scroll-box::before,
        .member-scroll-box::after {
            content: '';
            position: absolute;
            left: 0; width: 100%; height: 60px;
            z-index: 10; pointer-events: none;
        }
        .member-scroll-box::before {
            top: 0; background: linear-gradient(to bottom, var(--bg-color), transparent);
        }
        .member-scroll-box::after {
            bottom: 0; background: linear-gradient(to top, var(--bg-color), transparent);
        }

        .scroll-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            will-change: transform;
        }

        /* Hover Focus Effect */
        .scroll-wrapper:hover .member-card:not(:hover) {
            opacity: 0.5; filter: blur(1px); transform: scale(0.98);
        }

        /* --- Member Card Design --- */
        .member-card {
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .member-card:hover {
            background: var(--glass-hover);
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(0, 210, 255, 0.4);
            box-shadow: 0 12px 24px rgba(0, 210, 255, 0.15);
            z-index: 2;
        }

        .member-card img {
            width: 60px; height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid transparent;
            background: linear-gradient(var(--bg-color), var(--bg-color)) padding-box, 
                        linear-gradient(45deg, #00d2ff, #3a7bd5) border-box;
            flex-shrink: 0;
        }

        .member-info { flex-grow: 1; }
        .member-info h3 { margin: 0; font-size: 1.1rem; color: var(--text-main); font-weight: 600; }
        .member-info p { margin: 4px 0 0; font-size: 0.85rem; color: var(--text-sub); }

        .arrow-icon {
            color: var(--primary-accent);
            font-size: 1.2rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }
        .member-card:hover .arrow-icon { opacity: 1; transform: translateX(0); }

        /* --- Modal Design --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: #1e293b;
            padding: 35px 25px;
            border-radius: 24px;
            width: 320px;
            max-width: 85%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }

        .modal-content img {
            width: 100px; height: 100px;
            border-radius: 50%; object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(#1e293b, #1e293b) padding-box, 
                        linear-gradient(45deg, #00d2ff, #3a7bd5) border-box;
            margin-bottom: 15px;
        }

        .modal-content h2 { margin: 0 0 5px 0; color: var(--text-main); font-size: 1.3rem; }
        .modal-content h4 { margin: 0 0 15px 0; color: var(--primary-accent); font-weight: 400; font-size: 0.95rem; }
        .modal-content p { color: var(--text-sub); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }

        /* Social Icons */
        .social-links {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 25px;
        }
        .social-links a {
            color: var(--text-main); font-size: 1.2rem;
            width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.05); border-radius: 50%;
            text-decoration: none; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }
        .social-links a:hover {
            background: var(--primary-accent); color: #0f172a; transform: translateY(-3px);
        }

        .close-btn {
            padding: 10px 24px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none; border-radius: 12px; color: #fff;
            font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .close-btn:hover { box-shadow: 0 8px 15px rgba(0, 210, 255, 0.3); }

        .modal-close-icon {
            position: absolute; top: 15px; right: 20px;
            color: var(--text-sub); cursor: pointer; font-size: 1.5rem; transition: 0.2s;
        }
        .modal-close-icon:hover { color: #ff4757; }

        /* =========================================
           নতুন যোগ করা ফিচারের স্টাইল (কোনো কিছু না কেটেই)
           ========================================= */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 100%;
        }

        .controls-container {
            width: 380px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        @media (max-width: 480px) {
            .controls-container { width: 92%; }
        }

        .search-bar, .category-filter {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 15px;
            border-radius: 12px;
            outline: none;
            backdrop-filter: blur(16px);
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 0.98rem;
        }
        .search-bar { flex-grow: 1; }
        .search-bar::placeholder { color: var(--text-sub); }
        .category-filter { width: 130px; cursor: pointer; background-color: #1e293b; }
        .category-filter option { background-color: #1e293b; color: #fff; }

        .scroll-controls {
            position: absolute;
            right: calc(50% - 240px); /* বক্সের ঠিক ডান পাশে */
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 15;
        }
        @media (max-width: 550px) {
            .scroll-controls {
                right: 10px;
            }

            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary-accent);
            width: 45px; height: 45px;
            border-radius: 50%;

            backdrop-filter: blur(8px);

        const scrollContent = document.getElementById('scroll-content');

        function renderMembers(dataToRender = foundationMembers) {
            let htmlString = '';
            
            if(dataToRender.length === 0) {
                scrollContent.innerHTML = `<div style="text-align:center; color:var(--text-sub); padding:30px;">কোনো সদস্য পাওয়া যায়নি</div>`;
                return;
            }

            dataToRender.forEach(member => {
                // স্ট্যাটাস অনুযায়ী ডটের কালার (Active = Green, Inactive = Orange/Red)
                let statusColor = member.status === 'active' ? '#10b981' : '#f59e0b';

                htmlString += `
                    <div class="member-card" onclick="openMemberModal(${member.id})">
                        <div class="img-wrapper">
                            <img src="${member.image}" alt="${member.name}" loading="lazy">
                            <span class="status-dot" style="background-color: ${statusColor};"></span>
                        </div>
                        <div class="member-info">
                            <h3>${member.name}</h3>
                            <p>${member.role}</p>
                        </div>
                        <div class="arrow-icon"><i class="fa-solid fa-arrow-right"></i></div>
                    </div>
                `;
            });
            scrollContent.innerHTML = htmlString + htmlString; // আগের মতোই ডাবল করা হলো
        }

        renderMembers();

        // --- নতুন ফিল্টার এবং সার্চ ফাংশন ---
        function filterData() {
            let searchText = document.getElementById('searchInput').value.toLowerCase();
            let categoryText = document.getElementById('categoryFilter').value;

            let filteredList = foundationMembers.filter(member => {
                let matchesSearch = member.name.toLowerCase().includes(searchText);
                let matchesCategory = (categoryText === 'all') || (member.category === categoryText);
                return matchesSearch && matchesCategory;
            });
            
            scrollPos = 0; // ফিল্টার করলে স্ক্রল পজিশন রিসেট হবে
            renderMembers(filteredList);
        }

        // --- স্মুথ স্ক্রলিং লজিক (60FPS) (আগের মতই) ---
        let scrollPos = 0;
        let speed = 0.6; 
        let isPaused = false;
        let lastTime = 0;

        function smoothScroll(time) {
            if (!lastTime) lastTime = time;
            const deltaTime = time - lastTime;
            lastTime = time;

            if (!isPaused && scrollContent.scrollHeight > 0) {
                scrollPos -= speed * (deltaTime / 16.67); 
                const halfHeight = scrollContent.scrollHeight / 2;
                
                if (Math.abs(scrollPos) >= halfHeight) {
                    scrollPos = 0;
                }
                scrollContent.style.transform = `translateY(${scrollPos}px)`;
            }
            requestAnimationFrame(smoothScroll);
        }

        requestAnimationFrame(smoothScroll);

        scrollBox.addEventListener('mouseenter', () => isPaused = true);
        scrollBox.addEventListener('mouseleave', () => {
            if (!modal.classList.contains('active')) isPaused = false;
        });

        // --- নতুন ম্যানুয়াল স্ক্রল কন্ট্রোল লজিক ---
        let manualScrollInterval;
        function startManualScroll(direction) {
            isPaused = true;
            manualScrollInterval = setInterval(() => {
                scrollPos -= direction * 4; // ক্লিক করে ধরে রাখলে স্ক্রল হবে
                scrollContent.style.transform = `translateY(${scrollPos}px)`;
            }, 16);
        }

        function stopManualScroll() {
            clearInterval(manualScrollInterval);
            if (!modal.classList.contains('active')) isPaused = false;
        }

        // --- পপ-আপ (Modal) কন্ট্রোল (আগের মতই) ---
        function openMemberModal(id) {
            const member = foundationMembers.find(m => m.id === id);
            if(member) {
                document.getElementById('modal-name').innerText = member.name;
                document.getElementById('modal-role').innerText = member.role;
                document.getElementById('modal-img').src = member.image;
                document.getElementById('modal-desc').innerText = member.desc;

                // সোশ্যাল লিংক সেটআপ
                let socialHTML = '';
                if(member.facebook) {
                    socialHTML += `<a href="${member.facebook}" target="_blank" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>`;
                }
                if(member.whatsapp) {
                    socialHTML += `<a href="${member.whatsapp}" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>`;
                }
                document.getElementById('modal-social').innerHTML = socialHTML;

                modal.classList.add('active');
                isPaused = true;
            }
        }

        function toggleModal() {
            modal.classList.remove('active');
            isPaused = false;
        }

        // কীবোর্ড Esc এবং বাইরের ক্লিকে পপ-আপ বন্ধ হওয়া
        modal.addEventListener('click', toggleModal);
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && modal.classList.contains('active')) toggleModal();
        });

        // ==========================================
        // নতুন যুক্ত করা অটো-টাইপিং ইফেক্ট (Search Bar Placeholder)
        // ==========================================
        const typingInput = document.getElementById('searchInput');
        const placeholderTexts = ["নাম লিখে খুঁজুন...", "সভাপতি খুঁজুন...", "সাধারণ সম্পাদক খুঁজুন...", "কোষাধ্যক্ষ খুঁজুন...","সদস্যদের খুঁজুন...",];
        let textIndex = 0;
        let charIndex = 0;
        let isDeletingText = false;

        function typeEffect() {
            // যদি ইনপুটে কিছু লেখা থাকে অথবা ফোকাস থাকে, তাহলে টাইপিং অফ থাকবে
            if(document.activeElement === typingInput || typingInput.value.length > 0) {
                typingInput.setAttribute('placeholder', "নাম লিখে খুঁজুন...");
                setTimeout(typeEffect, 1000);
                return;
            }

            const currentText = placeholderTexts[textIndex];
            
            if (isDeletingText) {
                typingInput.setAttribute('placeholder', currentText.substring(0, charIndex - 1));
                charIndex--;
            } else {
                typingInput.setAttribute('placeholder', currentText.substring(0, charIndex + 1));
                charIndex++;
            }

            let typeSpeed = isDeletingText ? 50 : 100;

            if (!isDeletingText && charIndex === currentText.length) {
                typeSpeed = 1500; // টাইপ শেষ হলে কিছুক্ষণ দাঁড়াবে
                isDeletingText = true;
            } else if (isDeletingText && charIndex === 0) {
                isDeletingText = false;
                textIndex = (textIndex + 1) % placeholderTexts.length;
                typeSpeed = 500; // নতুন শব্দ শুরুর আগে একটু গ্যাপ
            }

            setTimeout(typeEffect, typeSpeed);
        }
        
        // পেজ লোড হওয়ার ১ সেকেন্ড পর টাইপিং শুরু হবে
        setTimeout(typeEffect, 1000);

    </script>
